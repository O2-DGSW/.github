name: 작업
description: 기능 개발 외 작업을 등록합니다 (refactor, chore, docs 등)
title: "[Task] "
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 작업 가이드
        수행할 작업에 대해 자세히 작성해주세요.

  - type: dropdown
    id: type
    attributes:
      label: 작업 유형
      options:
        - refactor
        - chore
        - docs
        - test
        - enhancement
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 작업 내용
      description: 수행할 작업을 명확하게 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: 작업 목적
      description: 이 작업이 왜 필요한지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      placeholder: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 자료