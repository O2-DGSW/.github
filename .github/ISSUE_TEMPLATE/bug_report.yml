name: 🐛 버그 리포트
description: 의도하지 않은 동작이나 오류를 제보합니다
title: "[Bug] "
labels: ["type: bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 버그 리포트 작성 가이드
        버그를 재현하고 수정하는데 필요한 정보를 자세히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했는지 간단히 설명해주세요.
      placeholder: "예: 로그인 시 토큰이 갱신되지 않습니다."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 단계를 순서대로 작성해주세요.
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 예상 동작
      description: 어떻게 동작해야 한다고 생각하시나요?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 어떻게 동작했나요?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 환경 정보
      description: 서버 버전, OS, Java 버전 등
      placeholder: "예: Java 17, Spring Boot 3.x, Ubuntu 22.04"

  - type: textarea
    id: logs
    attributes:
      label: 로그 및 에러 메시지
      description: 관련된 로그나 에러 메시지가 있다면 첨부해주세요.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 이 버그와 관련된 다른 정보가 있나요?