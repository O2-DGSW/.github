name: ✨ 기능 제안
description: 새로운 기능 추가를 요청합니다
title: "[Feature] "
labels: ["type: feature"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 기능 제안 가이드
        구현할 기능에 대해 자세히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 작업 내용
      description: 구현할 기능을 명확하게 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: 작업 목적
      description: 이 기능이 왜 필요한지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      description: 구현에 필요한 작업을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 자료
      description: 관련 링크나 참고 문서를 첨부해주세요.